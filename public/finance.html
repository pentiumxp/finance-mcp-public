<!doctype html>
<html lang="zh-CN" data-theme="dark" translate="no" class="notranslate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="google" content="notranslate">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Finance">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Finance MCP</title>
  <style id="finance-anti-flash">
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: #f3f3f5;
      color-scheme: dark;
    }
    :root[data-theme="light"],
    :root[data-theme="light"] body {
      background: #f2f2f5;
      color: #24262c;
      color-scheme: light;
    }
    @media (prefers-color-scheme: light) {
      :root[data-theme="system"],
      :root[data-theme="system"] body {
        background: #f2f2f5;
        color: #24262c;
        color-scheme: light;
      }
    }
    .finance-shell {
      background: inherit;
    }
    body.finance-booting .finance-shell,
    body.finance-booting .finance-bottom-nav {
      visibility: hidden;
    }
  </style>
  <script>
    (function () {
      var appearance = window.__FINANCE_PLUGIN_APPEARANCE__ || {};
      var theme = ["system", "light", "dark"].indexOf(appearance.theme) >= 0
        ? appearance.theme
        : localStorage.getItem("hermesWebTheme") || "dark";
      var fontSize = ["compact", "normal", "large", "xlarge"].indexOf(appearance.fontSize) >= 0
        ? appearance.fontSize
        : localStorage.getItem("financePluginFontSize") || "normal";
      document.documentElement.dataset.theme = theme;
      document.documentElement.dataset.pluginFontSize = fontSize;
    })();
  </script>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/finance-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/finance-icon-192.png">
  <link rel="stylesheet" href="/styles.css?v=finance-replica-20260620e">
</head>
<body class="finance-booting" data-finance-booting="true">
  <main class="finance-shell">
    <header class="finance-topbar">
      <button class="finance-icon-button" type="button" data-topbar-left data-open-settings aria-label="设置">
        <span class="finance-glyph finance-glyph-settings"></span>
      </button>
      <button class="finance-ledger-switch" type="button" data-open-ledger aria-label="切换账本">
        <div class="finance-title" data-ledger-name>日常账本</div>
        <div class="finance-subtitle" data-ledger-status></div>
      </button>
      <form class="finance-keyboard-composer composer" id="composer" data-hermes-composer data-finance-keyboard-composer>
        <button class="finance-icon-button" type="button" data-refresh aria-label="搜索账单">
          <span class="finance-glyph finance-glyph-refresh"></span>
        </button>
        <textarea id="messageInput" rows="1" inputmode="search" enterkeyhint="search" autocomplete="off" autocorrect="off" aria-label="搜索账单" data-finance-keyboard-composer-input></textarea>
      </form>
    </header>

    <section class="finance-view active" data-view="home">
      <section class="finance-summary">
        <div class="finance-summary-top">
          <div class="finance-summary-meta" data-summary-label>本年支出</div>
          <button class="finance-summary-currency-button" type="button" data-home-currency-button aria-label="切换币种">人民币</button>
        </div>
        <div class="finance-summary-amount" data-summary-expense>0</div>
        <div class="finance-summary-row">
          <span>收入 <strong data-summary-income>0</strong></span>
          <span>结余 <strong data-summary-net>0</strong></span>
        </div>
      </section>
      <section class="finance-home-services" aria-label="首页服务">
        <button type="button" data-open-entry="expense">
          <span class="finance-service-icon finance-service-quick"></span>
          <span>速记</span>
        </button>
        <button type="button" data-switch-view="transactions">
          <span class="finance-service-icon finance-service-detail"></span>
          <span>明细</span>
        </button>
        <button type="button" data-switch-view="reports">
          <span class="finance-service-icon finance-service-calendar"></span>
          <span>日历</span>
        </button>
        <button type="button" data-switch-view="plan">
          <span class="finance-service-icon finance-service-recurring"></span>
          <span>周期账</span>
        </button>
        <button type="button" data-open-settings>
          <span class="finance-service-icon finance-service-all"></span>
          <span>全部</span>
        </button>
      </section>
      <section class="finance-panel" aria-label="最近明细">
        <div class="finance-list" data-transaction-list></div>
      </section>
    </section>

    <section class="finance-view finance-entry-view" data-view="entry">
      <form class="wacai-entry-form" data-entry-form>
        <section class="wacai-entry-hero">
          <div class="wacai-entry-top">
            <button class="wacai-entry-back" type="button" data-entry-back aria-label="返回">
              <span class="finance-glyph finance-glyph-back"></span>
            </button>
            <button class="wacai-ledger-title" type="button" data-entry-title>日常账本</button>
            <span class="wacai-heart" aria-hidden="true"></span>
            <span class="wacai-gear" aria-hidden="true"></span>
          </div>
          <div class="wacai-entry-types" role="tablist" aria-label="记账类型">
            <button type="button" data-entry-type="income">收入</button>
            <button type="button" data-entry-type="expense" class="active">支出</button>
            <button type="button" data-entry-type="transfer">转账</button>
            <button type="button" data-entry-type="loan">借贷</button>
          </div>
        </section>

        <section class="finance-entry-category-panel">
          <div class="finance-entry-category-current">
            <button type="button" class="finance-entry-category-trigger" data-open-category-picker>
              <span class="finance-category-symbol icon-food-lunch" data-entry-category-icon></span>
              <strong data-entry-selected-category>午餐</strong>
            </button>
            <input name="amount" inputmode="none" autocomplete="off" placeholder="0" required readonly aria-label="金额" data-entry-amount>
          </div>
          <div class="finance-entry-category-grid" data-category-quick-list></div>
        </section>

        <label class="finance-category-select-field">
          <span>类别</span>
          <select name="category_hint" data-category-select></select>
        </label>

        <input type="hidden" name="note" data-entry-note-value>

        <section class="wacai-entry-meta">
          <button class="wacai-meta-button" type="button" data-open-entry-date data-entry-date-button>日期</button>
          <input type="hidden" name="occurred_at" data-entry-date-input>
          <label class="finance-chip-field finance-currency-field" hidden>
            <span>币种</span>
            <select name="currency" data-currency-select></select>
          </label>
          <label class="finance-chip-field">
            <span>账户</span>
            <select name="account_hint" data-account-select></select>
          </label>
          <label class="finance-chip-field" data-target-account-field hidden>
            <span>目标</span>
            <select name="target_account_hint" data-target-account-select></select>
          </label>
          <label class="finance-chip-field finance-hidden-form-field">
            <span>成员</span>
            <select name="member_hint" data-member-select></select>
          </label>
          <button class="wacai-meta-button" type="button" data-open-member-picker data-entry-member-label>成员</button>
          <button class="wacai-meta-button" type="button" data-open-tag-picker data-entry-tag-label>标签</button>
          <button class="wacai-meta-button" type="button" data-open-note-input data-entry-note-label>备注</button>
          <button class="wacai-meta-button wacai-camera-button" type="button" aria-label="附件"></button>
        </section>
        <input type="file" accept="image/*" capture="environment" data-attachment-camera hidden>
        <input type="file" accept="image/*" data-attachment-photo multiple hidden>
        <input type="file" data-attachment-file multiple hidden>

        <section class="wacai-keypad" aria-label="金额键盘">
          <button type="button" data-keypad-value="1">1</button>
          <button type="button" data-keypad-value="2">2</button>
          <button type="button" data-keypad-value="3">3</button>
          <button type="button" data-keypad-value="+">+</button>
          <button type="button" data-keypad-action="backspace" aria-label="删除">⌫</button>
          <button type="button" data-keypad-value="4">4</button>
          <button type="button" data-keypad-value="5">5</button>
          <button type="button" data-keypad-value="6">6</button>
          <button type="button" data-keypad-value="-">−</button>
          <button type="button" data-keypad-action="again">再记</button>
          <button type="button" data-keypad-value="7">7</button>
          <button type="button" data-keypad-value="8">8</button>
          <button type="button" data-keypad-value="9">9</button>
          <button type="button" data-keypad-action="multiply-divide">× ÷</button>
          <button class="wacai-save-key" type="submit" data-entry-save>保存</button>
          <button type="button" data-keypad-value="0">0</button>
          <button type="button" data-keypad-value="00">00</button>
          <button type="button" data-keypad-value=".">.</button>
          <button type="button" data-keypad-action="equals">=</button>
        </section>
        <div class="finance-form-status" data-entry-status></div>
      </form>
    </section>

    <section class="finance-view" data-view="reports">
      <section class="wacai-report-filter">
        <div class="finance-report-filter-top">
          <div class="wacai-period-tabs" role="tablist" aria-label="统计周期">
            <button type="button" class="active" data-report-period="all">全部</button>
            <button type="button" data-report-period="year">年</button>
            <button type="button" data-report-period="quarter">季</button>
            <button type="button" data-report-period="month">月</button>
            <button type="button" data-report-period="more">更多</button>
          </div>
          <button class="finance-report-currency-button" type="button" data-report-currency-button aria-label="切换币种">人民币</button>
        </div>
        <div class="wacai-date-range">
          <button type="button" data-report-prev aria-label="上一期">‹</button>
          <button type="button" data-report-date-start>2005/12/31</button>
          <span>~</span>
          <button type="button" data-report-date-end>2026/11/25</button>
          <button type="button" data-report-next aria-label="下一期">›</button>
          <button class="wacai-filter-button" type="button" aria-label="筛选"></button>
        </div>
      </section>

      <div class="finance-report-tabs" role="tablist" aria-label="统计维度">
        <button type="button" data-report-dimension="trend">趋势</button>
        <button type="button" class="active" data-report-dimension="category">大类</button>
        <button type="button" data-report-dimension="subcategory">小类</button>
        <button type="button" data-report-dimension="member">成员</button>
        <button type="button" data-report-dimension="account">账户</button>
        <button type="button" data-report-dimension="merchant">商家</button>
        <button type="button" data-report-dimension="tag">标签</button>
        <button type="button" data-report-more-menu aria-label="更多维度">☰</button>
      </div>

      <section class="finance-panel wacai-report-card">
        <header class="finance-section-header">
          <h2 data-report-title>大类支出</h2>
          <div class="wacai-card-tools">
            <button type="button" aria-label="列表视图"></button>
            <button type="button" aria-label="展开视图"></button>
          </div>
        </header>
        <div class="finance-donut-wrap">
          <div class="finance-donut-labels" data-report-donut-labels></div>
          <div class="finance-donut" data-report-donut>
            <div class="finance-donut-center">
              <span>总支出</span>
              <strong data-report-total>0</strong>
            </div>
          </div>
        </div>
        <div class="finance-report-list" data-report-list></div>
      </section>
    </section>

    <section class="finance-view" data-view="transactions">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2>全部明细</h2>
          <span>点按查看详情</span>
        </header>
        <label class="finance-transaction-search">
          <span>搜索</span>
          <input type="search" autocomplete="off" enterkeyhint="search" placeholder="搜索账单、类目、备注、账户" data-transaction-search>
        </label>
        <section class="finance-transaction-services" aria-label="账单快捷入口">
          <button type="button" data-open-entry="expense">
            <span class="finance-service-icon finance-service-quick"></span>
            <span>速记</span>
          </button>
          <button type="button" data-switch-view="reports">
            <span class="finance-service-icon finance-service-calendar"></span>
            <span>日历</span>
          </button>
          <button type="button" data-switch-view="plan">
            <span class="finance-service-icon finance-service-recurring"></span>
            <span>周期账</span>
          </button>
        </section>
        <div class="finance-transaction-search-status" data-transaction-search-status></div>
        <div class="finance-list" data-all-transaction-list></div>
      </section>
    </section>

    <section class="finance-view finance-detail-view" data-view="report-trend">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2 data-report-trend-title>趋势</h2>
          <span data-report-trend-status>报表</span>
        </header>
        <div class="finance-report-switch" aria-label="报表操作">
          <button type="button" class="active" data-report-trend-mode="trend">趋势</button>
          <button type="button" data-open-report-detail>明细</button>
        </div>
        <div class="finance-trend-chart" data-report-trend-chart></div>
        <div class="finance-report-note" data-report-trend-summary></div>
        <div class="finance-report-list" data-report-trend-list></div>
      </section>
    </section>

    <section class="finance-view finance-detail-view" data-view="report-breakdown">
      <section class="finance-panel wacai-report-card">
        <header class="finance-section-header">
          <h2 data-report-breakdown-title>占比</h2>
          <span data-report-breakdown-status>报表</span>
        </header>
        <div class="finance-donut" data-report-breakdown-donut>
          <div class="finance-donut-center">
            <span>总支出</span>
            <strong data-report-breakdown-total>0</strong>
          </div>
        </div>
        <div class="finance-report-list" data-report-breakdown-list></div>
      </section>
    </section>

    <section class="finance-view finance-detail-view" data-view="report-detail">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2 data-report-detail-title>明细</h2>
          <span data-report-detail-status>账单</span>
        </header>
        <div class="finance-list" data-report-detail-list></div>
      </section>
    </section>

    <section class="finance-view finance-detail-view" data-view="transaction-detail">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2>账目详情</h2>
          <span data-detail-status>明细</span>
        </header>
        <div class="finance-detail-grid" data-transaction-detail></div>
      </section>
    </section>

    <section class="finance-view" data-view="accounts">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2>账户</h2>
          <span>余额</span>
        </header>
        <div class="finance-list" data-account-list></div>
      </section>
    </section>

    <section class="finance-view" data-view="plan">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2>计划</h2>
          <button type="button" data-generate-recurring-due>入账</button>
        </header>
        <div class="finance-recurring-toolbar">
          <button type="button" data-open-recurring-create>新增周期账</button>
          <span data-recurring-status></span>
        </div>
        <div class="finance-list" data-recurring-list></div>
      </section>
    </section>

    <section class="finance-view" data-view="assets">
      <section class="finance-panel finance-assets-panel">
        <header class="finance-section-header">
          <h2>资产</h2>
          <span data-asset-status>Owner</span>
        </header>
        <section class="finance-asset-summary" data-asset-summary>
          <div class="finance-empty">暂无资产快照</div>
        </section>
        <div class="finance-asset-history" data-asset-history></div>
      </section>
    </section>

    <section class="finance-view" data-view="stocks">
      <section class="finance-panel finance-assets-panel finance-stocks-panel">
        <header class="finance-section-header">
          <h2>股票</h2>
          <span data-stock-status>Owner</span>
        </header>
        <section class="finance-asset-summary" data-stock-summary>
          <div class="finance-empty">暂无股票快照</div>
        </section>
        <div class="finance-asset-history" data-stock-history></div>
      </section>
    </section>

    <section class="finance-view" data-view="settings">
      <section class="finance-panel">
        <header class="finance-section-header">
          <h2>我的</h2>
          <span>MCP-only</span>
        </header>
        <div class="finance-settings-row">
          <div>
            <strong>集成边界</strong>
            <span>Hermes Mobile 只通过 finance MCP 使用本服务。</span>
          </div>
        </div>
      </section>
    </section>

    <nav class="finance-bottom-nav" aria-label="主导航">
      <button type="button" class="active" data-nav-view="home">
        <span class="finance-nav-icon finance-nav-home"></span>
        <span>账本</span>
      </button>
      <button type="button" data-nav-view="plan">
        <span class="finance-nav-icon finance-nav-plan"></span>
        <span>计划</span>
      </button>
      <button type="button" class="finance-nav-primary" data-nav-view="entry">
        <span class="finance-nav-icon finance-nav-entry"></span>
        <span>记账</span>
      </button>
      <button type="button" data-nav-view="reports">
        <span class="finance-nav-icon finance-nav-report"></span>
        <span>报表</span>
      </button>
      <button type="button" data-nav-view="assets" data-owner-assets-nav hidden>
        <span class="finance-nav-icon finance-nav-asset"></span>
        <span>资产</span>
      </button>
      <button type="button" data-nav-view="stocks" data-owner-stocks-nav hidden>
        <span class="finance-nav-icon finance-nav-stock"></span>
        <span>股票</span>
      </button>
      <button type="button" data-nav-view="settings">
        <span class="finance-nav-icon finance-nav-settings"></span>
        <span>我的</span>
      </button>
    </nav>
  </main>

  <div class="finance-overlay hidden" data-settings-overlay></div>
  <div class="finance-overlay hidden" data-report-action-overlay></div>
  <div class="finance-overlay hidden" data-report-picker-overlay></div>
  <div class="finance-overlay hidden" data-attachment-overlay></div>
  <div class="finance-overlay hidden" data-ledger-overlay></div>
  <div class="finance-overlay hidden" data-category-picker-overlay></div>
  <div class="finance-overlay hidden" data-entry-choice-overlay></div>
  <div class="finance-overlay hidden" data-entry-note-overlay></div>
  <div class="finance-overlay hidden" data-entry-date-overlay></div>
  <div class="finance-overlay hidden" data-recurring-overlay></div>
  <script src="/app-finance-ui.js?v=finance-replica-20260620e"></script>
</body>
</html>
